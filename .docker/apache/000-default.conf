<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    ServerName ci4ms
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/ci4ms_error.log
    CustomLog ${APACHE_LOG_DIR}/ci4ms_access.log combined
</VirtualHost>
